name: Build HCR Mod Dylib

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          brew install ldid xz
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          curl -fsSL https://github.com/theos/sdks/releases/latest/download/iPhoneOS16.5.sdk.tar.xz | tar -xJf - -C $HOME/theos/sdks

      - name: Build Dylib
        run: |
          export THEOS=$HOME/theos
          export THEOS_MAKE_PATH=$HOME/theos/makefiles
          make -j4
        
      - name: Upload Dylib
        uses: actions/upload-artifact@v4
        with:
          name: HCRMod-dylib
          path: |
            .theos/obj/debug/*.dylib
            packages/*.deb
          if-no-files-found: warn
